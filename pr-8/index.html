<!doctype html>
<html lang="en">
<head>
<base href="/website-previews/pr-8/"/>
<meta charset="utf-8"/>
<title>Constructor Fabric — Open-source AI fabric for Software as a Service</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="description" content="Open-source AI fabric for Software as a Service. Lets AI define, build, and run software end to end — with reusable components, operational automation, and built-in productivity measurement and insights."/>
<link rel="canonical" href="https://constructorfabric.org/"/>
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg"/>
<link rel="preconnect" href="https://unpkg.com" crossorigin/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://constructorfabric.org/"/>
<meta property="og:title" content="Constructor Fabric — Open-source AI fabric for Software as a Service"/>
<meta property="og:description" content="Lets AI define, build, and run software end to end — with reusable components, operational automation, and built-in productivity measurement and insights."/>
<meta property="og:image" content="https://constructorfabric.org/assets/img/og-image.svg"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="Constructor Fabric — Open-source AI fabric for Software as a Service"/>
<meta name="twitter:description" content="Lets AI define, build, and run software end to end — with reusable components, operational automation, and built-in productivity measurement and insights."/>
<meta name="twitter:image" content="https://constructorfabric.org/assets/img/og-image.svg"/>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Constructor Fabric",
  "url": "https://constructorfabric.org/",
  "description": "Open-source AI fabric for Software as a Service.",
  "sameAs": ["https://github.com/constructorfabric"]
}
</script>
<link rel="stylesheet" href="styles.css"/>
<script defer src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script defer src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script defer src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Home">
  <div id="root"></div>
  <script type="text/babel" src="partials.jsx"></script>
  <script type="text/babel">
    const { Fragment } = React;

    function NotCard({ title, body }) {
      return (
        <div className="not-card">
          <h4>{title}</h4>
          <p>{body}</p>
        </div>
      );
    }

    function BenefitCard({ n, title, body }) {
      return (
        <div className="card">
          <h3 style={{marginTop:6}}>{title}</h3>
          <p style={{marginTop:10}}>{body}</p>
        </div>
      );
    }

    function ElementLinkCard({ title, body, href, icon, linkLabel = 'Read more →' }) {
      return (
        <a className="link-card" href={href}>
          <h3 style={{color:'var(--navy)', marginTop:8, display:'flex', alignItems:'center', gap:8}}>
            {icon && <span style={{display:'inline-flex', flexShrink:0}}>{icon}</span>}
            {title}
          </h3>
          <p style={{color:'var(--text-2)', margin:0, fontSize:15, lineHeight:1.55}}>{body}</p>
          <span className="link-card__arrow">{linkLabel}</span>
        </a>
      );
    }

    function DiffCard({ title, body }) {
      return (
        <div className="card">
          <h3 style={{marginTop:6}}>{title}</h3>
          <p style={{marginTop:10}}>{body}</p>
        </div>
      );
    }

    function CapabilityItem({ title }) {
      return (
        <div style={{ display:'flex', gap:14, alignItems:'flex-start', padding:'18px 0', borderTop: '1px solid var(--line-soft)' }}>
          <span className="check-badge" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3.5 8.2 6.5 11 12.5 5" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </span>
          <div style={{ color:'var(--navy)', fontWeight:500, fontSize:15.5, lineHeight:1.45 }}>{title}</div>
        </div>
      );
    }

    function NoLockCard({ title, body }) {
      return (
        <div className="card">
          <div className="accent-rule"/>
          <h3 style={{ fontSize:20 }}>{title}</h3>
          <p style={{marginTop:10}}>{body}</p>
        </div>
      );
    }

    function Home() {
      return (
        <Fragment>
          <SiteHeader active="home"/>

          {/* HERO */}
          <section style={{ position:'relative', overflow:'hidden', background:'#fff' }}>
            <div className="hero-bg"/>
            <div className="container" style={{ position:'relative', padding:'48px var(--pad-x) 56px' }}>
              <div style={{display:'grid', gridTemplateColumns:'1fr', gap:40, alignItems:'center'}} className="hero-grid">
                <div>
                  <h1 className="display" style={{ marginBottom: 18 }}>Constructor Fabric</h1>
                  <h2 style={{ fontWeight:500, color:'var(--text-2)', letterSpacing:'-0.02em', marginBottom:20 }}>
                    <span className="gradient-text">Open-source AI fabric</span> for Software as a Service
                  </h2>
                  <p className="lead" style={{maxWidth:'56ch', marginBottom:28}}>
                    Lets AI define, build, and run software end to end — with reusable components, operational automation, and built-in productivity measurement and insights.
                  </p>
                  <div style={{display:'flex', gap:12, flexWrap:'wrap'}}>
                    <a className="btn btn-primary btn-lg" href="https://github.com/constructorfabric"><GitHubIcon size={16}/>GitHub</a>
                    <a className="btn btn-secondary btn-lg" href="elements.html">Explore the fabric</a>
                  </div>
                </div>

                <div style={{alignSelf:'center', width:'100%'}}>
                  <div className="frame hero-cycle" style={{padding:18}}>
                    <ConstructorFabricCycle/>
                  </div>
                </div>
              </div>

              <style>{`
                /* Cap the hero SDLC cycle so it doesn't dominate stacked layouts.
                   Without this, the SVG (viewBox 0 0 600 600, width:100%) fills
                   the entire column width on narrow viewports and becomes a huge
                   square below the hero copy. 420px reads well on phones and
                   keeps the desktop hero balanced too. */
                .hero-cycle { max-width: 420px; margin: 0 auto; }
                @media (min-width: 1024px) {
                  .hero-grid { grid-template-columns: 1.05fr 1fr !important; gap: 56px !important; }
                  .hero-cycle { max-width: 480px; }
                }
              `}</style>
            </div>
          </section>

          {/* ELEMENTS */}
          <section className="section section--soft">
            <div className="container">
              <div className="grid-4">
                <ElementLinkCard title="Learn"
                  icon={<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/><path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>}
                  body="Start here! Whether you're new to using AI to speed-up the software development or you're actively using Claude Code or OpenAI Codes with Cursor or Windsurf - learn how to make it even more efficient - to plan, build and operate your software."
                  href="learn.html"
                  linkLabel="Learn →" />
                <ElementLinkCard title="GitHub"
                  icon={<GitHubIcon size={18}/>}
                  body="Our GitHub organization contains the source code for all the tools you can use to improve the efficiency of planning, building and operating the XaaS software using AI and all the components that you can re-use to build your  products."
                  href="https://github.com/constructorfabric"
                  linkLabel="Explore →" />
                <ElementLinkCard title="Discord"
                  icon={<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>}
                  body="Join our Discord channel, interact with other Constructor Fabric users, get notified about updates, get and provide help."
                  href="https://discord.gg/QWHtHGgEdq"
                  linkLabel="Engage →" />
                <ElementLinkCard title="Contact"
                  icon={<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>}
                  body="If you're not sure where to start or have a complex product or a large product engineering organization and need to talk to us - please contact us and let's talk!"
                  href="mailto:contact@constructorfabric.org"
                  linkLabel="Get in touch →" />
              </div>
            </div>
          </section>

          {/* PROBLEM */}
          <section className="section section--white">
            <div className="container">
              <div className="section-head">
                <div className="eyebrow">AI acceleration paradox</div>
                <h2>Fast coding, but not faster delivery?</h2>
                <p>Code generation isn't the bottleneck anymore. Fragmented requirements, drifting architecture, manual coordination, and brittle operations are.</p>
              </div>
              <div className="card" style={{padding:'16px 24px'}}>
                <ul className="bullets bullets--dot" style={{margin:0, display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(260px, 1fr))', columnGap:32, rowGap:0}}>
                  <li style={{padding:'12px 0'}}>No traceability from intent to production</li>
                  <li style={{padding:'12px 0'}}>Inconsistent requirements and architecture across services</li>
                  <li style={{padding:'12px 0'}}>Limited control over what AI generates</li>
                  <li style={{padding:'12px 0'}}>Manual coordination across teams and releases</li>
                  <li style={{padding:'12px 0'}}>Operations and incident handling stay slow</li>
                  <li style={{padding:'12px 0'}}>Growing technical debt and limited reuse</li>
                </ul>
              </div>
            </div>
          </section>

          {/* SOLUTION */}
          <section className="section section--soft">
            <div className="container">
              <div className="section-head">
                <div className="eyebrow">Solution</div>
                <h2>Constructor Fabric</h2>
                <p>Constructor Fabric is a unified, AI-native fabric that connects the entire software development and maintenance lifecycle: plan, build, run. It weaves processes, tools, and reusable components into one traceable flow from requirements to production.</p>
              </div>
            </div>
          </section>

          {/* BENEFITS */}
          <section className="section section--white">
            <div className="container">
              <div className="section-head">
                <h2>Benefits</h2>
              </div>
              <div className="grid-3">
                <BenefitCard n="01" title="End-to-End Visibility"
                  body="A single connected fabric across processes, tools, and systems. Every artifact is linked, traceable, and explorable from intent to operations." />
                <BenefitCard n="02" title="Controlled Flows"
                  body="Requirements to production, governed by deterministic IDs and validation. AI generation is bounded by specifications, not free-form prompting." />
                <BenefitCard n="03" title="Continuous Acceleration"
                  body="The system learns. Bottlenecks get detected, workflows improve, and reuse compounds through standard components and patterns." />
              </div>
            </div>
          </section>

          {/* ELEMENTS */}
          <section className="section section--soft">
            <div className="container">
              <div className="section-head">
                <h2>Elements</h2>
              </div>
              <div className="grid-3">
                <ElementLinkCard title="Constructor Studio"
                  body="Structure and process organizer. Full SDLC coverage with specifications, traceability, and AI governance."
                  href="elements.html#studio" />
                <ElementLinkCard title="Constructor Insight"
                  body="Productivity benchmarking. Correlates AI adoption with real output across teams and tools."
                  href="elements.html#insight" />
                <ElementLinkCard title="Constructor Gears"
                  body="Stack of reusable components. Business Support System modules, platform services, and integration engines."
                  href="elements.html#gears" />
              </div>
            </div>
          </section>

          {/* DIFFERENTIATORS */}
          <section className="section section--white">
            <div className="container">
              <div className="section-head">
                <h2>Constructor Fabric works with your AI stack</h2>
              </div>
              <div className="grid-3">
                <DiffCard title="Best match for AI coding tools"
                  body="Constructor Fabric is not a replacement for Claude Code or OpenAI Codex — it makes them generating production-ready solution. Combine the creativity and speed of AI-assisted coding with Constructor Fabric's visibility, control, governance, and SDLC orchestration." />
                <DiffCard title="Open and extendable by design"
                  body="Constructor Fabric is built to connect with the tools your teams already use. It is already integrated with services like RalphX and is open for additional integrations across your engineering ecosystem." />
                <DiffCard title="For teams ready to move beyond PoC"
                  body="Vibe coding tools are great for fast prototypes and early experiments. Constructor Fabric is the next step when you are ready to move from proof-of-concept to production." />
              </div>
            </div>
          </section>

          {/* WHAT IT IS NOT */}
          <section className="section section--soft">
            <div className="container">
              <div className="section-head">
                <h2>What Constructor Fabric is NOT</h2>
              </div>
              <div className="grid-5">
                <NotCard title="Not an IDE" body="Use Claude Code, Cursor, your IDE of choice"/>
                <NotCard title="Not a CI/CD tool" body="Use Jenkins, GitHub Actions, what you already run"/>
                <NotCard title="Not a project management tool" body="Plug into Atlassian, Linear, whatever you use"/>
                <NotCard title="Not a service registry" body="Backstage and similar tools stay where they are"/>
                <NotCard title="Not production infrastructure" body="Runs on AWS, Azure, GCP — your call"/>
              </div>
            </div>
          </section>

          {/* CAPABILITIES */}
          <section className="section section--white">
            <div className="container">
              <div className="section-head">
                <h2>Unique capabilities</h2>
              </div>
              <div className="grid-4">
                <CapabilityItem title="SPEC templates and checklists"/>
                <CapabilityItem title="Customizable code generation workflows"/>
                <CapabilityItem title="Traceability IDs across the lifecycle"/>
                <CapabilityItem title="Deterministic CI checks for AI output"/>
                <CapabilityItem title="Brownfield project support"/>
                <CapabilityItem title="ISO 29148 compliance"/>
                <CapabilityItem title="Cross-repository spec and code validation"/>
                <CapabilityItem title="Productivity benchmarking with AI adoption correlation"/>
              </div>
            </div>
          </section>

          {/* NO LOCK-IN */}
          <section className="section section--soft">
            <div className="container">
              <div className="section-head">
                <h2>Open source, no lock-in</h2>
              </div>
              <div className="grid-3">
                <NoLockCard title="Open"
                  body="Apache 2.0 open source foundation. Plugin-based. Extensible. Supports most languages, stacks, and deployment models." />
                <NoLockCard title="Modular"
                  body="Use Constructor Studio, Constructor Insight, or Constructor Gears independently. Start with one piece. Expand if it works for you." />
                <NoLockCard title="Compatible"
                  body="Plugs into existing tools, frameworks, and CI/CD. No replacement. No architecture rewrite. Complements current workflows." />
              </div>
            </div>
          </section>

          <CtaStart/>

          <SiteFooter/>
        </Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Home/>);
    if (location.hash) {
      setTimeout(() => {
        const el = document.querySelector(location.hash);
        if (el) el.scrollIntoView();
      }, 0);
    }
  </script>
</body>
</html>
