<!doctype html>
<html lang="en">
<head>
<base href="/website-previews/pr-6/"/>
<meta charset="utf-8"/>
<title>Privacy Policy — Constructor Fabric</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="description" content="How constructorfabric.org collects and processes personal data: GDPR-aligned policy, with rights extended globally — covering Google Analytics, cookies, data subject rights, and contact handling."/>
<meta name="robots" content="index, follow"/>
<link rel="canonical" href="https://constructorfabric.org/privacy-policy.html"/>
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg"/>
<link rel="preconnect" href="https://unpkg.com" crossorigin/>
<link rel="stylesheet" href="styles.css"/>
<script defer src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script defer src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script defer src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  /* Privacy page-local styles. Kept here (not in styles.css) because they are
     only used on this page. */
  .privacy-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 32px;
    align-items: start;
  }
  @media (min-width: 1024px) {
    .privacy-layout { grid-template-columns: 240px minmax(0, 1fr); gap: 56px; }
  }

  /* Mobile jump menu (collapsed by default) */
  .privacy-jump {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    padding: 0;
    overflow: hidden;
    margin-bottom: 40px;
  }
  .privacy-jump summary {
    list-style: none;
    cursor: pointer;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--blue);
  }
  .privacy-jump summary::-webkit-details-marker { display: none; }
  .privacy-jump summary::after {
    content: "+";
    font-family: var(--font-sans);
    font-size: 18px;
    line-height: 1;
    color: var(--blue);
  }
  .privacy-jump[open] summary::after { content: "–"; }
  .privacy-jump ol {
    list-style: none;
    margin: 0;
    padding: 0 0 12px;
    border-top: 1px solid var(--line);
  }
  .privacy-jump ol li a {
    display: block;
    padding: 10px 18px;
    font-size: 14px;
    color: var(--text-2);
  }
  .privacy-jump ol li a:hover { color: var(--blue-bright); background: #fff; }
  @media (min-width: 1024px) { .privacy-jump { display: none; } }

  /* Sticky ToC (desktop) */
  .privacy-toc {
    display: none;
    position: sticky;
    top: 96px;
    align-self: start;
    font-size: 13.5px;
    border-left: 1px solid var(--line);
    padding-left: 20px;
  }
  @media (min-width: 1024px) { .privacy-toc { display: block; } }
  .privacy-toc__label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  .privacy-toc ol {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    counter-reset: toc;
  }
  .privacy-toc ol li { counter-increment: toc; }
  .privacy-toc ol li a {
    display: flex;
    gap: 10px;
    color: var(--text-muted);
    line-height: 1.45;
  }
  .privacy-toc ol li a::before {
    content: counter(toc, decimal-leading-zero);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    flex: 0 0 22px;
    padding-top: 2px;
  }
  .privacy-toc ol li a:hover { color: var(--navy); }
  .privacy-toc ol li a:hover::before { color: var(--blue); }

  /* Prose */
  .privacy-prose { max-width: 70ch; min-width: 0; color: var(--text); }
  .privacy-prose section + section { margin-top: 56px; }
  .privacy-prose h2 {
    font-size: 26px;
    line-height: 1.2;
    margin-bottom: 18px;
    scroll-margin-top: 88px;
  }
  @media (min-width: 768px) { .privacy-prose h2 { font-size: 30px; } }
  .privacy-prose h3 {
    font-size: 17px;
    color: var(--navy);
    margin-top: 28px;
    margin-bottom: 10px;
  }
  .privacy-prose p {
    color: var(--text-2);
    font-size: 16px;
    line-height: 1.7;
    margin: 0 0 16px;
  }
  .privacy-prose ul {
    padding-left: 0;
    list-style: none;
    margin: 0 0 16px;
  }
  .privacy-prose ul li {
    position: relative;
    padding-left: 22px;
    color: var(--text-2);
    font-size: 16px;
    line-height: 1.7;
    margin-bottom: 8px;
  }
  .privacy-prose ul li::before {
    content: "";
    position: absolute;
    left: 4px;
    top: 12px;
    width: 5px; height: 5px;
    border-radius: 999px;
    background: var(--blue-bright);
  }
  .privacy-prose a { color: var(--blue-bright); }
  .privacy-prose a:hover { color: var(--blue); text-decoration: underline; }
  .privacy-prose strong { color: var(--navy); font-weight: 600; }
  .privacy-prose code {
    font-family: var(--font-mono);
    font-size: 13.5px;
    background: var(--blue-tint);
    color: var(--blue);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* Confirm marker — flags content that needs legal/operational verification */
  .confirm {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.04em;
    background: #FFF6E5;
    color: #8A5A00;
    border: 1px solid #F1D89B;
    padding: 1px 7px;
    border-radius: 4px;
  }

  /* Cookie table */
  .cookie-table-wrap { overflow-x: auto; max-width: 100%; margin: 18px 0 8px; }
  .cookie-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    min-width: 560px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .cookie-table th, .cookie-table td {
    text-align: left;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line-soft);
    vertical-align: top;
  }
  .cookie-table th {
    background: var(--bg-soft);
    font-family: var(--font-mono);
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .cookie-table td:first-child {
    font-family: var(--font-mono);
    color: var(--navy);
    white-space: nowrap;
  }
  .cookie-table tr:last-child td { border-bottom: none; }

  /* Header block with last-updated chip */
  .privacy-head { margin-bottom: 40px; }
  .privacy-head__meta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--blue-tint);
    color: var(--blue);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    margin-bottom: 20px;
  }
  .privacy-head__meta .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--blue-bright); }
  .privacy-head h1 {
    font-size: var(--fs-h1);
    margin-bottom: 14px;
  }
  .privacy-head p { color: var(--text-2); font-size: var(--fs-lead); max-width: 60ch; line-height: 1.55; }

  .privacy-disclaimer {
    margin-top: 56px;
    padding: 18px 20px;
    border: 1px dashed var(--line);
    border-radius: var(--radius-md);
    font-size: 13.5px;
    color: var(--text-muted);
    line-height: 1.6;
    background: var(--bg-soft);
  }
</style>
</head>
<body data-screen-label="Privacy">
  <div id="root"></div>
  <script type="text/babel" src="partials.jsx"></script>
  <script type="text/babel">
    const { Fragment } = React;

    const sections = [
      { id: 'controller',     label: 'Data controller' },
      { id: 'data',           label: 'Data we process' },
      { id: 'purposes',       label: 'Purposes & legal basis' },
      { id: 'recipients',     label: 'Recipients & processors' },
      { id: 'transfers',      label: 'International transfers' },
      { id: 'retention',      label: 'Retention' },
      { id: 'rights',         label: 'Your rights' },
      { id: 'exercise',       label: 'How to exercise rights' },
      { id: 'cookies',        label: 'Cookies' },
      { id: 'changes',        label: 'Changes to this policy' },
    ];

    function Privacy() {
      return (
        <Fragment>
          <SiteHeader active=""/>

          <main className="section section--white" style={{paddingTop: 48}}>
            <div className="container">
              <div className="privacy-head">
                <span className="privacy-head__meta">
                  <span className="dot"/>Last updated: 11 May 2026
                </span>
                <h1>Privacy Policy</h1>
                <p>
                  This page describes what personal data <a href="https://constructorfabric.org">constructorfabric.org</a> processes,
                  why we process it, and the rights you have as a visitor.
                  We use the EU General Data Protection Regulation (GDPR) as our baseline framework and voluntarily extend
                  the rights it grants to all visitors worldwide, regardless of where you are located.
                  We collect the minimum needed to run the site and understand how it is used.
                </p>
              </div>

              {/* Mobile jump menu */}
              <details className="privacy-jump">
                <summary>On this page</summary>
                <ol>
                  {sections.map(s => (
                    <li key={s.id}><a href={'#' + s.id}>{s.label}</a></li>
                  ))}
                </ol>
              </details>

              <div className="privacy-layout">
                {/* Desktop sticky ToC */}
                <nav className="privacy-toc" aria-label="On this page">
                  <div className="privacy-toc__label">On this page</div>
                  <ol>
                    {sections.map(s => (
                      <li key={s.id}><a href={'#' + s.id}>{s.label}</a></li>
                    ))}
                  </ol>
                </nav>

                <article className="privacy-prose">
                  <section id="controller">
                    <h2>1. Data controller</h2>
                    <p>
                      The controller responsible for processing personal data via constructorfabric.org is
                      the <strong>Constructor Fabric Foundation</strong> <span className="confirm">[CONFIRM: legal entity name, registered address, and EU representative if applicable]</span>.
                    </p>
                    <p>
                      For any privacy-related questions or requests, contact us at{' '}
                      <a href="mailto:contact@constructorfabric.org">contact@constructorfabric.org</a>.
                    </p>
                  </section>

                  <section id="data">
                    <h2>2. Data we process</h2>
                    <p>constructorfabric.org is a marketing and documentation site for an open-source platform. We do not run user accounts, payments, or newsletter sign-ups. The data we process is limited to:</p>

                    <h3>Usage data (analytics)</h3>
                    <ul>
                      <li>Pseudonymous identifiers set by Google Analytics 4 (the <code>_ga</code> and <code>_ga_*</code> cookies)</li>
                      <li>Truncated IP address (GA4 anonymizes IPs before storage)</li>
                      <li>Pages viewed, time on page, referrer, entry and exit URLs</li>
                      <li>Device, browser, operating system, screen resolution</li>
                      <li>Approximate geographic location derived from IP (country / region level)</li>
                    </ul>

                    <h3>Search performance data</h3>
                    <p>Aggregated, anonymous metrics from Google Search Console — search queries that led to the site, impressions, clicks, and average position. This data is aggregated by Google and does not identify individual users.</p>

                    <h3>Email correspondence</h3>
                    <p>If you email <a href="mailto:contact@constructorfabric.org">contact@constructorfabric.org</a>, we process the content of your message, your email address, and any information you choose to include, in order to respond.</p>
                  </section>

                  <section id="purposes">
                    <h2>3. Purposes & legal basis</h2>
                    <p>We apply the GDPR's legal-basis framework to all processing on the site, regardless of visitor location. Under Article 6 GDPR, each processing activity has a defined purpose and legal basis:</p>
                    <ul>
                      <li><strong>Operating the site</strong> — serving pages and assets. Legal basis: legitimate interest (Art. 6(1)(f) GDPR) in providing a functioning website.</li>
                      <li><strong>Analytics</strong> — measuring traffic, identifying popular content, and improving the site. Legal basis: consent (Art. 6(1)(a) GDPR). Google Analytics 4 is loaded only after you accept analytics cookies via the CookieYes banner on your first visit. You can withdraw consent at any time through the CookieYes preferences (see §9).</li>
                      <li><strong>Search Console metrics</strong> — understanding which queries surface the site. Legal basis: legitimate interest (Art. 6(1)(f) GDPR). Google aggregates this data; no consent is required from individual users.</li>
                      <li><strong>Responding to email enquiries</strong> — handling correspondence sent to <code>contact@constructorfabric.org</code>. Legal basis: legitimate interest (Art. 6(1)(f) GDPR), or performance of pre-contractual steps if your enquiry relates to a contract (Art. 6(1)(b)).</li>
                    </ul>
                  </section>

                  <section id="recipients">
                    <h2>4. Recipients & processors</h2>
                    <p>We use the following third parties to operate the site:</p>
                    <ul>
                      <li><strong>Google Ireland Limited</strong> (Gordon House, Barrow Street, Dublin 4, Ireland) — Google Analytics 4 and Google Search Console. Acts as a processor for analytics data and as an independent controller for some operational metadata.</li>
                      <li><strong>Virtuozzo</strong> — serves the static site. Standard server logs (IP address, user-agent, request path, timestamp) may be retained by the host for operational and security purposes.</li>
                    </ul>
                    <p>We do not sell personal data and do not share it with advertising networks or social media trackers. The site does not load Facebook, X, LinkedIn, or other social pixels.</p>
                  </section>

                  <section id="transfers">
                    <h2>5. International transfers</h2>
                    <p>
                      Google is a US-headquartered company. Use of Google Analytics and Google Search Console can involve transfer of data to the United States. Google relies on the
                      <strong> EU–US Data Privacy Framework</strong> (Google LLC is certified) and on <strong>Standard Contractual Clauses</strong> as a transfer mechanism under Article 46 GDPR.
                    </p>
                    <p>
                      You can review Google's data processing terms at{' '}
                      <a href="https://business.safety.google/adsprocessorterms/" rel="noopener" target="_blank">business.safety.google/adsprocessorterms/</a>{' '}
                      and Google's privacy policy at{' '}
                      <a href="https://policies.google.com/privacy" rel="noopener" target="_blank">policies.google.com/privacy</a>.
                    </p>
                  </section>

                  <section id="retention">
                    <h2>6. Retention</h2>
                    <ul>
                      <li><strong>Google Analytics 4 data</strong> — event data is retained for 2 months; user data is retained for 14 months.</li>
                      <li><strong>Analytics cookies on your device</strong> — see the cookies table below for individual durations.</li>
                      <li><strong>Search Console data</strong> — aggregated metrics are retained by Google according to its own policies (typically 16 months for search analytics).</li>
                      <li><strong>Email correspondence</strong> — retained for as long as needed to handle your enquiry, and afterwards only where we have a legal or legitimate-interest reason to keep it (typically no longer than 24 months).</li>
                      <li><strong>Server logs</strong> — retained by the hosting provider according to its policies <span className="confirm">[CONFIRM: hosting provider's log retention]</span>.</li>
                    </ul>
                  </section>

                  <section id="rights">
                    <h2>7. Your rights</h2>
                    <p>We extend the rights granted by the GDPR (Articles 15–22) to all visitors worldwide, regardless of your location. You have the following rights regarding your personal data:</p>
                    <ul>
                      <li><strong>Access</strong> — obtain confirmation of whether we process your data and a copy of it.</li>
                      <li><strong>Rectification</strong> — correct inaccurate or incomplete data.</li>
                      <li><strong>Erasure</strong> — request deletion of your data ("right to be forgotten").</li>
                      <li><strong>Restriction</strong> — limit how we process your data in specific cases.</li>
                      <li><strong>Portability</strong> — receive your data in a structured, commonly used, machine-readable format.</li>
                      <li><strong>Objection</strong> — object to processing based on legitimate interest, including analytics.</li>
                      <li><strong>Withdraw consent</strong> — where processing relies on consent, withdraw it at any time without affecting prior lawful processing.</li>
                      <li><strong>Lodge a complaint</strong> — with the data protection supervisory authority in your EU country of residence, place of work, or place of the alleged infringement. Visitors outside the EU may also contact their local data protection or privacy authority where one exists.</li>
                    </ul>
                  </section>

                  <section id="exercise">
                    <h2>8. How to exercise your rights</h2>
                    <p>
                      Email <a href="mailto:contact@constructorfabric.org">contact@constructorfabric.org</a>. State which right you want to exercise and provide enough information for us to identify the data concerned. We respond within one month of receipt; in complex cases we may extend this by two further months and will tell you if we do.
                    </p>
                    <p>
                      To opt out of Google Analytics specifically, you can install the{' '}
                      <a href="https://tools.google.com/dlpage/gaoptout" rel="noopener" target="_blank">Google Analytics opt-out browser add-on</a>,
                      block analytics cookies via your browser settings, or use a content blocker.
                    </p>
                  </section>

                  <section id="cookies">
                    <h2>9. Cookies</h2>
                    <p>
                      The site uses a small number of cookies. <strong>Strictly necessary cookies</strong> are required for the site to function and do not require consent — this category includes the CookieYes consent cookie itself, which stores your choices so we don't re-prompt you. <strong>Analytics cookies</strong> are set by Google Analytics 4 and are non-essential.
                    </p>
                    <p>
                      A CookieYes consent banner is shown on your first visit. Analytics cookies are only set after you accept them; declining keeps GA4 from loading at all. You can review or change your choices at any time via the CookieYes preferences modal, accessible from the banner's preferences control on subsequent visits.
                    </p>

                    <div className="cookie-table-wrap">
                      <table className="cookie-table">
                        <thead>
                          <tr>
                            <th>Name</th>
                            <th>Provider</th>
                            <th>Purpose</th>
                            <th>Duration</th>
                          </tr>
                        </thead>
                        <tbody>
                          <tr>
                            <td>cookieyes-consent</td>
                            <td>CookieYes</td>
                            <td>Stores the user's cookie consent preferences so they are not re-prompted on every page load.</td>
                            <td>1 year</td>
                          </tr>
                          <tr>
                            <td>_ga</td>
                            <td>Google Analytics</td>
                            <td>Distinguishes unique users by assigning a randomly generated client ID.</td>
                            <td>2 years</td>
                          </tr>
                          <tr>
                            <td>_ga_SXP4SXGCGC</td>
                            <td>Google Analytics</td>
                            <td>Persists session state for this GA4 property (measurement ID G-SXP4SXGCGC).</td>
                            <td>2 years</td>
                          </tr>
                        </tbody>
                      </table>
                    </div>

                    <p>
                      You can delete cookies at any time through your browser. Doing so does not remove data already collected, but it prevents further data collection from that device.
                    </p>
                  </section>

                  <section id="changes">
                    <h2>10. Changes to this policy</h2>
                    <p>
                      We may update this policy to reflect changes in our processing, applicable law, or third-party services. Substantive changes will be announced on this page with an updated "Last updated" date at the top. The current version is dated <strong>11 May 2026</strong>.
                    </p>
                  </section>

                  <div className="privacy-disclaimer">
                    This policy is provided for informational purposes and does not constitute legal advice.
                    Before relying on it for a production deployment, have it reviewed by qualified counsel
                    against the current state of your data processing activities and applicable supervisory-authority guidance.
                  </div>
                </article>
              </div>
            </div>
          </main>

          <SiteFooter/>
        </Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Privacy/>);

    /* Smooth-scroll to anchor on load if hash is present (header is sticky) */
    if (location.hash) {
      setTimeout(() => {
        const el = document.querySelector(location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
    }
  </script>
</body>
</html>
